<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Model Prices</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3M19 19H5V5H19V19M9 17H7V10H9V17M13 17H11V7H13V17M17 17H15V13H17V17' fill='%231a73e8'/%3E%3C/svg%3E">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3M19 19H5V5H19V19M9 17H7V10H9V17M13 17H11V7H13V17M17 17H15V13H17V17' fill='%2358a6ff'/%3E%3C/svg%3E" media="(prefers-color-scheme: dark)">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <div class="top-bar">
    <h1><span class="mdi mdi-chart-box-outline"></span> Model Prices</h1>
    <div class="top-bar-actions">
      <button id="filterToggle" class="icon-btn" title="Filter prices"><span class="mdi mdi-tune"></span></button>
      <span class="model-count"><span class="mdi mdi-layers"></span> <span id="c-all"></span></span>
      <button id="themeToggle" class="icon-btn" title="Toggle theme"><span class="mdi mdi-weather-night"></span></button>
    </div>
  </div>
  <div class="search-currency-row">
    <div class="search-wrap">
      <span class="mdi mdi-magnify"></span>
      <input id="search" type="text" placeholder="Search models..." autofocus>
    </div>
    <select class="currency-select" id="currency">
      <option value="BRL">BRL R$</option>
      <option value="USD">USD $</option>
      <option value="EUR">EUR €</option>
      <option value="GBP">GBP £</option>
      <option value="CAD">CAD C$</option>
      <option value="JPY">JPY ¥</option>
      <option value="AUD">AUD A$</option>
      <option value="CNY">CNY ¥</option>
      <option value="ARS">ARS $</option>
    </select>
  </div>
  <div class="filter-panel" id="filterPanel">
    <div class="price-range-filter">
      <div class="range-slider" id="rangeSlider">
        <div class="range-track"></div>
        <div class="range-fill" id="rangeFill"></div>
        <input type="range" id="minRange" min="0" max="100" step="0.01" value="0">
        <input type="range" id="maxRange" min="0" max="100" step="0.01" value="100">
      </div>
      <div class="range-labels">
        <span class="coin-indicator" id="coinInd">R$</span>
        <input type="number" id="rangeLabelMin" class="range-number" value="0" step="any">
        <span class="range-sep">—</span>
        <input type="number" id="rangeLabelMax" class="range-number" value="0" step="any" placeholder="∞">
        <span class="coin-indicator" id="coinInd2">R$</span>
      </div>
    </div>
  </div>
  <div class="tabs" id="mainTabs">
    <button class="tab active" data-view="chart"><span class="mdi mdi-chart-bar"></span> Chart</button>
    <button class="tab" data-view="compare"><span class="mdi mdi-compare-horizontal"></span> Compare</button>
    <button class="tab" data-view="matches"><span class="mdi mdi-link-variant"></span> Matches</button>
    <button class="tab" data-view="list"><span class="mdi mdi-format-list-bulleted"></span> List</button>
  </div>
</header>
<div class="container">

  <div id="view-chart" class="view">
    <div class="section-title">
      <span class="mdi mdi-chart-bar"></span> Top Models by Price <span id="currencyLabel"></span>
      <span class="chart-type-toggle">
        <button class="chart-type-btn active" data-chart="bar">Bar</button>
        <button class="chart-type-btn" data-chart="pie">Pie</button>
      </span>
    </div>
    <div class="chart-wrap" id="chartWrap">
      <canvas id="priceChart"></canvas>
      <div class="skeleton" id="chartSkel"></div>
    </div>
  </div>

  <div id="view-compare" class="view hidden">
    <div class="section-title"><span class="mdi mdi-compare-horizontal"></span> Compare Models</div>
    <div class="compare-bar">
      <div class="search-dropdown" id="srchA"><input placeholder="Model A..." class="sd-input" id="sdA"><div class="sd-list" id="sdListA"></div></div>
      <div class="search-dropdown" id="srchB"><input placeholder="Model B..." class="sd-input" id="sdB"><div class="sd-list" id="sdListB"></div></div>
      <button id="compBtn"><span class="mdi mdi-compare"></span> Compare</button>
      <div class="chips" id="compChips"></div>
    </div>
    <div class="compare-view active" id="compareView"></div>
  </div>

  <div id="view-matches" class="view hidden">
    <div class="section-title"><span class="mdi mdi-link-variant"></span> Price Matches</div>
    <div class="match-section">
      <div class="match-list" id="matchList"></div>
    </div>
  </div>

  <div id="view-list" class="view hidden">
    <div class="grid" id="grid"></div>
  </div>
</div>
<footer>
  <span class="mdi mdi-update"></span> Updated: <span id="updated"></span> ·
  <span class="mdi mdi-currency-usd"></span> Rates: <span id="rateInfo"></span>
  <div class="shortcuts">
    <span><kbd>1</kbd><kbd>4</kbd> Views</span>
    <span><kbd>←</kbd><kbd>→</kbd> Navigate</span>
    <span><kbd>R</kbd> Refresh chart</span>
    <span><kbd>Esc</kbd> Clear search</span>
  </div>
</footer>
<script src="js/script.js"></script>
</body>
</html>
